<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeLog Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('home') }}" class="logo">🍳 RecipeLog</a>
            <div class="nav-links">
                <a href="{{ url_for('home') }}" class="{{ 'active' if request.endpoint == 'home' }}">Home</a>
                <a href="{{ url_for('search_online') }}" class="{{ 'active' if request.endpoint == 'search_online' }}">🔍 Search Web</a>
                <a href="{{ url_for('create') }}" class="nav-btn">Add Recipe</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} animate-pop">
                  {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <footer style="text-align: center; padding: 2rem; color: #888; font-size: 0.9rem;">
        &copy; 2026 RecipeLog Pro | Built with Flask
    </footer>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
