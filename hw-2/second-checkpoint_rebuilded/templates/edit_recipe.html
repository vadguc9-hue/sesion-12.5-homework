{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Edit Recipe</h2>
    <form action="{{ url_for('edit', recipe_id=recipe.id) }}" method="POST">
        <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" name="name" class="form-input" value="{{ recipe.name }}" required>
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <select name="category" class="form-input">
                <option value="Breakfast" {% if recipe.category == 'Breakfast' %}selected{% endif %}>Breakfast</option>
                <option value="Lunch" {% if recipe.category == 'Lunch' %}selected{% endif %}>Lunch</option>
                <option value="Dinner" {% if recipe.category == 'Dinner' %}selected{% endif %}>Dinner</option>
                <option value="Dessert" {% if recipe.category == 'Dessert' %}selected{% endif %}>Dessert</option>
                <option value="Snack" {% if recipe.category == 'Snack' %}selected{% endif %}>Snack</option>
                <option value="Web" {% if recipe.category == 'Web' %}selected{% endif %}>Web Import</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating (1-5)</label>
            <input type="number" name="rating" class="form-input" min="1" max="5" value="{{ recipe.rating }}">
        </div>

        <div class="form-group">
            <label>Image URL</label>
            <input type="url" name="image_url" class="form-input" value="{{ recipe.image_url if recipe.image_url else '' }}">
        </div>

        <div class="form-group">
            <label>Ingredients</label>
            <textarea name="ingredients" class="form-input" rows="5" required>{{ recipe.ingredients }}</textarea>
        </div>

        <div class="form-group">
            <label>Instructions</label>
            <textarea name="instructions" class="form-input" rows="8">{{ recipe.instructions }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Update Recipe</button>
        <a href="{{ url_for('home') }}" class="btn" style="margin-left: 10px; text-decoration: none; color: #333;">Cancel</a>
    </form>
</div>
{% endblock %}
