{% extends "base.html" %}
{% block content %}
<div class="form-container">
    <h2>Add New Recipe</h2>
    <form action="{{ url_for('create') }}" method="POST">
        <div class="form-group">
            <label>Recipe Name</label>
            <input type="text" name="name" class="form-input" required placeholder="e.g., Grandma's Apple Pie">
        </div>
        
        <div class="form-group">
            <label>Category</label>
            <select name="category" class="form-input">
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Dessert">Dessert</option>
                <option value="Snack">Snack</option>
            </select>
        </div>

        <div class="form-group">
            <label>Rating (1-5)</label>
            <input type="number" name="rating" class="form-input" min="1" max="5" value="5">
        </div>

        <div class="form-group">
            <label>Image URL (Optional)</label>
            <input type="url" name="image_url" class="form-input" placeholder="https://example.com/photo.jpg">
            <small style="color: #666;">Paste a link to a picture of this meal.</small>
        </div>

        <div class="form-group">
            <label>Ingredients (One per line)</label>
            <textarea name="ingredients" class="form-input" rows="5" required placeholder="1 cup flour&#10;2 eggs"></textarea>
        </div>

        <div class="form-group">
            <label>Instructions</label>
            <textarea name="instructions" class="form-input" rows="5" placeholder="Step 1..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Recipe</button>
        <a href="{{ url_for('home') }}" class="btn" style="margin-left: 10px; text-decoration: none; color: #333;">Cancel</a>
    </form>
</div>
{% endblock %}
